<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Paquete</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 24px;
            margin-bottom: 20px;
        }

        .status-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .status-badge {
            font-size: 24px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
        }

        .PENDIENTE { background: rgba(251, 191, 36, 0.2); color: #fbbf24; border: 1px solid #fbbf24; }
        .EN_CAMINO { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid #3b82f6; }
        .ENTREGADO { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .INCIDENCIA { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--glass-border);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -34px;
            top: 5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            border: 3px solid var(--bg);
        }

        .timeline-date {
            font-size: 12px;
            color: #94a3b8;
        }

        .timeline-status {
            font-weight: 600;
            font-size: 15px;
            margin: 4px 0;
        }

        .timeline-notes {
            font-size: 14px;
            color: #cbd5e1;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 14px;
        }

        .info-label { color: #94a3b8; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="status-header">
                <div class="info-label">Estado Actual</div>
                <div id="mainBadge" class="status-badge">Cargando...</div>
            </div>
            
            <div class="info-grid">
                <div>
                    <div class="info-label">Tracking #</div>
                    <div id="trackNum">---</div>
                </div>
                <div>
                    <div class="info-label">Entrega Estimada</div>
                    <div id="estDate">---</div>
                </div>
                <div style="grid-column: span 2;">
                    <div class="info-label">Destinatario</div>
                    <div id="destName">---</div>
                </div>
            </div>
        </div>

        <h3 style="margin-left: 10px; color: #818cf8;">Historial de Movimientos</h3>
        <div class="card">
            <div id="timeline" class="timeline">
                <!-- Se cargan dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        async function loadData() {
            if (!id) {
                document.getElementById('mainBadge').innerText = 'ID No Encontrado';
                return;
            }

            try {
                // Info del Envío
                const resEnvio = await fetch(`/api/envios/${id}`);
                if (!resEnvio.ok) throw new Error('Error al obtener datos del envío');
                
                const envio = await resEnvio.json();
                
                document.getElementById('mainBadge').innerText = envio.estado;
                document.getElementById('mainBadge').className = 'status-badge ' + envio.estado;
                document.getElementById('trackNum').innerText = '#' + (envio.trackingNumber || '---');
                document.getElementById('destName').innerText = envio.destinatario || '---';
                document.getElementById('estDate').innerText = envio.fechaEstimadaEntrega ? new Date(envio.fechaEstimadaEntrega).toLocaleDateString() : '---';

                // Historial
                const resHist = await fetch(`/api/envios/${id}/historial`);
                if (resHist.ok) {
                    const historial = await resHist.json();
                    const timeline = document.getElementById('timeline');
                    timeline.innerHTML = '';

                    historial.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'timeline-item';
                        div.innerHTML = `
                            <div class="timeline-date">${new Date(item.fechaCambio).toLocaleString()}</div>
                            <div class="timeline-status">${item.estadoNuevo}</div>
                            <div class="timeline-notes">${item.notas || ''}</div>
                        `;
                        timeline.appendChild(div);
                    });
                }
            } catch (err) {
                console.error(err);
                document.getElementById('mainBadge').innerText = 'Error de Conexión';
                document.getElementById('mainBadge').className = 'status-badge INCIDENCIA';
                alert('No se pudo conectar con el servidor. Si estás usando un móvil, asegúrate de estar en la misma red y usar la IP de tu computadora.');
            }
        }

        loadData();
    </script>
</body>
</html>
