<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Envío | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 600px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 20px;
        }

        .qr-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .qr-img {
            max-width: 200px;
            border-radius: 15px;
            border: 4px solid white;
            background: white;
        }

        h2 { margin-top: 0; font-size: 24px; text-align: center; color: #818cf8; }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }

        select, textarea, input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-save:hover { background: #4f46e5; }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Volver al Panel</a>
        
        <div class="card qr-section">
            <h2 id="trackTitle">#---</h2>
            <div id="pinBox" style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed var(--primary);">
                <div style="font-size: 12px; color: #94a3b8; margin-bottom: 5px;">PIN DE SEGURIDAD</div>
                <div id="displayPin" style="font-size: 24px; font-weight: 600; letter-spacing: 5px; color: #818cf8;">----</div>
            </div>
            <img id="qrImage" class="qr-img" src="" alt="Cargando QR...">
            <p style="font-size: 14px; color: #94a3b8; margin-top: 10px;">Escanea este código para ver el seguimiento público</p>
            <div style="margin-top: 15px;">
                <a id="clientLink" href="#" target="_blank" style="color: #818cf8; font-size: 14px; text-decoration: none; border: 1px solid #818cf8; padding: 8px 16px; border-radius: 10px; display: inline-block;">Ver como Cliente (Abrir link)</a>
            </div>
        </div>

        <div class="card">
            <h2>Actualizar Estado</h2>
            <form id="updateForm">
                <div class="form-group">
                    <label>Nuevo Estado</label>
                    <select id="nuevoEstado">
                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="EN_CAMINO">EN CAMINO</option>
                        <option value="ENTREGADO">ENTREGADO</option>
                        <option value="INCIDENCIA">INCIDENCIA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notas / Evidencia</label>
                    <textarea id="notas" rows="3" placeholder="Ej: Paquete dejado en recepción"></textarea>
                </div>
                <div class="form-group">
                    <label>Foto de Evidencia (Opcional)</label>
                    <input type="file" id="evidenciaFile" accept="image/*">
                </div>
                <button type="submit" class="btn-save">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        async function init() {
            if (!id) return;

            // Cargar QR
            document.getElementById('qrImage').src = `/api/envios/${id}/qr`;

            // Cargar Info
            const res = await fetch(`/api/envios/${id}`);
            const data = await res.json();
            document.getElementById('trackTitle').innerText = '#' + data.trackingNumber;
            document.getElementById('displayPin').innerText = data.pin || '----';
            document.getElementById('nuevoEstado').value = data.estado;

            // Setear link de cliente usando el código alfanumérico
            document.getElementById('clientLink').href = `/seguimiento.html?code=${data.trackingNumber}`;
        }

        document.getElementById('updateForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.btn-save');
            btn.innerText = 'Guardando...';
            btn.disabled = true;

            try {
                const estado = document.getElementById('nuevoEstado').value;
                const notas = document.getElementById('notas').value;
                const fileInput = document.getElementById('evidenciaFile');
                let evidenciaUrl = '';

                // 1. Subir archivo si existe
                if (fileInput.files.length > 0) {
                    const formData = new FormData();
                    formData.append('file', fileInput.files[0]);
                    const uploadRes = await fetch('/api/files/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    evidenciaUrl = uploadData.url;
                }

                // 2. Actualizar estado del envío
                const res = await fetch(`/api/envios/${id}/actualizar?nuevoEstado=${estado}&notas=${encodeURIComponent(notas)}&evidenciaUrl=${encodeURIComponent(evidenciaUrl)}`, {
                    method: 'POST'
                });

                if (res.ok) {
                    alert('Estado actualizado correctamente');
                    window.location.href = '/';
                }
            } catch (err) {
                alert('Error al guardar los cambios');
            } finally {
                btn.innerText = 'Guardar Cambios';
                btn.disabled = false;
            }
        };

        init();
    </script>
</body>
</html>
