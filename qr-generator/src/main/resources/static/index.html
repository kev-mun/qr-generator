<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de QR con Base de Datos</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        form { display: flex; flex-direction: column; gap: 10px; width: 300px; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #2ecc71; color: white; cursor: pointer; border: none; }
        #resultado { margin-top: 20px; }
    </style>
</head>
<body>
<h2>Crear Nuevo QR</h2>
<form id="qrForm">
    <input type="text" id="nombre" placeholder="Nombre del QR (ej: Mi Web)" required>
    <input type="text" id="contenido" placeholder="Contenido o URL" required>
    <button type="submit">Generar y Guardar</button>
</form>
<div id="resultado"></div>

<script>
    document.getElementById('qrForm').onsubmit = async (e) => {
        e.preventDefault();
        const nombre = document.getElementById('nombre').value;
        const contenido = document.getElementById('contenido').value;

        // Llamamos a tu API (ajusta la URL si es diferente)
        const response = await fetch(`/api/qr/generate?text=${encodeURIComponent(contenido)}&name=${encodeURIComponent(nombre)}`);
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        document.getElementById('resultado').innerHTML = `<img src="${url}" alt="QR"> <p>¡Guardado en H2!</p>`;
    };
</script>
</body>
</html>
