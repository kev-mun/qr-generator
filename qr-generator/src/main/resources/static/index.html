<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            box-sizing: border-box;
        }

        nav {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-1px);
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h2 { margin: 0 0 30px 0; font-weight: 600; }

        form { display: flex; flex-direction: column; gap: 16px; }

        input {
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--primary); }

        .btn-generate {
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-generate:hover { background: var(--primary-hover); transform: translateY(-1px); }

        #resultado { margin-top: 30px; }
        
        #resultado img {
            max-width: 200px;
            border-radius: 16px;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .success-badge {
            color: #86efac;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">QR Generator</div>
        <form action="/logout" method="POST">
            <button type="submit" class="logout-btn">Cerrar Sesión</button>
        </form>
    </nav>

    <div class="container">
        <h2>Crear Nuevo QR</h2>
        <form id="qrForm">
            <input type="text" id="nombre" placeholder="Nombre del QR (ej: Mi Web)" required>
            <input type="text" id="contenido" placeholder="URL o Texto" required>
            <button type="submit" class="btn-generate">Generar y Guardar</button>
        </form>
        <div id="resultado"></div>
    </div>

    <script>
        document.getElementById('qrForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.btn-generate');
            const originalText = btn.innerText;
            btn.innerText = 'Generando...';
            btn.disabled = true;

            const nombre = document.getElementById('nombre').value;
            const contenido = document.getElementById('contenido').value;

            try {
                const response = await fetch(`/api/qr/generate?text=${encodeURIComponent(contenido)}&name=${encodeURIComponent(nombre)}`);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);

                document.getElementById('resultado').innerHTML = `
                    <img src="${url}" alt="QR">
                    <p class="success-badge">✓ ¡Guardado con éxito!</p>
                `;
            } catch (err) {
                alert('Error al generar el QR');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
