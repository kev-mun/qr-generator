<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Logístico | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
        }

        h2 { margin-top: 0; font-size: 20px; color: #818cf8; }

        form { display: flex; flex-direction: column; gap: 15px; }

        input, textarea, select {
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
        }

        button {
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #4f46e5; }

        .shipment-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .shipment-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .PENDIENTE { background: #fbbf24; color: #000; }
        .EN_CAMINO { background: #3b82f6; color: #fff; }
        .ENTREGADO { background: #10b981; color: #fff; }
        .INCIDENCIA { background: #ef4444; color: #fff; }

        .btn-action {
            background: rgba(255, 255, 255, 0.1);
            font-size: 13px;
            padding: 6px 12px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dashboard Logístico</h1>
        <form action="/logout" method="POST">
            <button type="submit" style="background: #ef4444; font-size: 14px;">Cerrar Sesión</button>
        </form>
    </div>

    <div class="container">
        <!-- Formulario de Creación -->
        <div class="card">
            <h2>Nuevo Envío</h2>
            <form id="createForm">
                <input type="text" id="destinatario" placeholder="Nombre del Destinatario" required>
                <input type="text" id="ciudadDestino" placeholder="Ciudad de Destino" required>
                <textarea id="descripcion" placeholder="Descripción del Paquete" rows="3" required></textarea>
                <button type="submit">Generar Envío y QR</button>
            </form>
        </div>

        <!-- Lista de Envíos -->
        <div class="card">
            <h2>Envíos Activos</h2>
            <div id="shipmentList" class="shipment-list">
                <!-- Se cargan dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        async function loadShipments() {
            const res = await fetch('/api/envios/all');
            const data = await res.json();
            const list = document.getElementById('shipmentList');
            list.innerHTML = '';
            
            data.forEach(envio => {
                const item = document.createElement('div');
                item.className = 'shipment-item';
                item.innerHTML = `
                    <div>
                        <strong>#${envio.trackingNumber}</strong><br>
                        <small>${envio.destinatario}</small>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="badge ${envio.estado}">${envio.estado}</span>
                        <a href="/gestion.html?id=${envio.id}" class="button btn-action" style="text-decoration:none; color:white; background:rgba(255,255,255,0.1); border-radius:5px; padding:5px 10px;">Gestionar</a>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        document.getElementById('createForm').onsubmit = async (e) => {
            e.preventDefault();
            const dest = document.getElementById('destinatario').value;
            const ciudad = document.getElementById('ciudadDestino').value;
            const desc = document.getElementById('descripcion').value;
            
            const res = await fetch(`/api/envios/crear?destinatario=${encodeURIComponent(dest)}&descripcion=${encodeURIComponent(desc)}&ciudadDestino=${encodeURIComponent(ciudad)}`, {
                method: 'POST'
            });
            
            if (res.ok) {
                alert('Envío creado con éxito');
                loadShipments();
                e.target.reset();
            }
        };

        loadShipments();
    </script>
</body>
</html>
