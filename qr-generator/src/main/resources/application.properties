# ==============================================================
# CONFIGURACIÓN DE BASE DE DATOS NEON (POSTGRESQL)
# ==============================================================

# URL de conexión principal (JDBC)
spring.datasource.url=jdbc:postgresql://ep-fancy-haze-an91n4dj-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&stringtype=unspecified

# Credenciales de acceso
spring.datasource.username=neondb_owner
spring.datasource.password=npg_qs7TyJIQ2anN

# Clase del Driver para PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==============================================================

# Dialecto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ddl-auto=update: Sincroniza tus clases Java con las tablas de Neon sin borrar datos
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola para depuración
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar H2 Console (ya no se usa con Neon)
spring.h2.console.enabled=false

# ==============================================================
# CONFIGURACIÓN DEL POOL DE CONEXIONES (HIKARI)
# ==============================================================

# Recomendado para conexiones en la nube como Neon
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Configuración de Swagger (Documentación API)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
